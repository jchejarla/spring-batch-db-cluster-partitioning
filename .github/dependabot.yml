# Dependabot keeps dependencies patched and surfaces vulnerable versions.
# Note: CVE *alerts* / security updates are the high-value part and are controlled in
# repo Settings → Code security (independent of this file). The entries below are routine
# version-update PRs, kept low-noise: monthly, minor/patch grouped into one PR.
version: 2
updates:
  # Maven dependencies (the library + examples).
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    # One PR for all routine minor/patch bumps; majors still surface individually.
    groups:
      maven-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used by the CI/docs workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  # Python docs tooling (requirements-docs.txt).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
