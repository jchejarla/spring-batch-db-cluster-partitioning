name: Publish versioned docs

# Publishes versioned documentation + Javadoc to GitHub Pages under the /docs/ prefix (the
# hand-maintained landing page at the site root is left untouched). Each version is browsable at
# /docs/<version>/ and shown in the on-page version selector:
#   - Push to main       -> rolling "dev" docs at /docs/dev/ (not aliased "latest").
#   - Push a release tag -> frozen /docs/<version>/ aliased "latest"; /docs/ redirects to it.
#   - workflow_dispatch  -> deploy the given version (aliased "latest"), e.g. for a dry run.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label to deploy (e.g. 3.0.0)'
        required: true

permissions:
  contents: write

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate Javadoc
        run: mvn -B -pl spring-batch-db-cluster-core -am javadoc:javadoc

      - name: Stage Javadoc into docs/apidocs
        run: |
          apidocs="$(find spring-batch-db-cluster-core/target -type f -name index.html -path '*apidocs*' -exec dirname {} \; | head -1)"
          if [ -z "$apidocs" ]; then echo "Javadoc output not found under target"; exit 1; fi
          rm -rf docs/apidocs && mkdir -p docs/apidocs
          cp -r "$apidocs"/. docs/apidocs/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install docs tooling
        run: pip install -r requirements-docs.txt

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git and fetch existing pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Preserve the existing gh-pages content (landing page + prior versions).
          git fetch origin gh-pages || true

      - name: Deploy versioned docs + Javadoc
        run: |
          if [ "${{ steps.ver.outputs.release }}" = "true" ]; then
            # Release (tag or manual): frozen version, move the "latest" alias, point /docs/ at latest.
            mike deploy --deploy-prefix docs --update-aliases --push "${{ steps.ver.outputs.version }}" latest
            mike set-default --deploy-prefix docs --push latest
          else
            # Rolling dev docs from main (not aliased "latest"). If no release exists yet, point /docs/
            # at dev so the site isn't empty; once a release exists, /docs/ stays on latest.
            has_release="$(git show origin/gh-pages:docs/versions.json 2>/dev/null | grep -c '"latest"' || true)"
            mike deploy --deploy-prefix docs --push dev
            if [ "${has_release:-0}" = "0" ]; then
              mike set-default --deploy-prefix docs --push dev
            fi
          fi
