# Builds, tests, and verifies the project on every push and pull request.

name: CI Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required by the dependency-submission step below

    strategy:
      matrix:
        # The project targets Java 21 (Spring Boot 4 / Spring Batch 6); Java 17 can no longer build it.
        java-version: [ '21' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven

    - name: Build and run unit tests
      run: mvn -B clean verify --file pom.xml -Dgpg.skip=true

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-java-${{ matrix.java-version }}
        path: '**/target/surefire-reports/*.xml'
        retention-days: 14

    - name: Generate SBOM (Java 21 only)
      if: matrix.java-version == '21' && github.event_name == 'push'
      run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

    - name: Upload SBOM
      if: matrix.java-version == '21' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: 'target/bom.*'
        retention-days: 90

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts
    - name: Update dependency graph
      if: matrix.java-version == '21' && github.event_name == 'push'
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
