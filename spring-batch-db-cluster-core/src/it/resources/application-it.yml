spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  sql:
    init:
      # Spring Boot 4 no longer auto-initializes the Spring Batch schema, so create it here; the cluster
      # auto-DDL runs afterwards via @DependsOnDatabaseInitialization.
      mode: always
      schema-locations: classpath:org/springframework/batch/core/schema-h2.sql
  batch:
    job:
      # Don't auto-run jobs on startup; the test launches the job itself.
      enabled: false
    cluster:
      enabled: true
      node-id-prefix: ${HOSTNAME:worker}
      heartbeat-interval: 5000
      initialize-schema: embedded
  main:
    allow-circular-references: true

debug: true
