# Zero-setup profile for trying the example locally.
#
# This profile uses H2 in file-mode with AUTO_SERVER=TRUE, which means:
#   - No external database is required.
#   - Multiple JVMs on the same machine (i.e. multiple cluster nodes)
#     can share the same database file — the first JVM auto-acts as an
#     embedded TCP server for the rest.
#   - State persists across runs in ./build/h2-cluster-demo*.
#     To start fresh, stop all nodes and remove that directory.
spring:
  datasource:
    url: jdbc:h2:file:./build/h2-cluster-demo;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      # With AUTO_SERVER, the first JVM to open the file becomes an embedded TCP server for the
      # rest. If several nodes are launched at the exact same moment against a fresh file, the ones
      # that lose the race briefly see H2's "Lock file recently modified" until the server is up.
      # Let Hikari retry the initial connection for a few seconds instead of failing fast, so you
      # can cold-start all nodes simultaneously without staggering them.
      initialization-fail-timeout: 20000
      connection-timeout: 20000
  h2:
    console:
      # Local demo convenience only — this profile runs a file-mode H2 on localhost. The H2 console is
      # an attack surface (it exposes a SQL shell), so never enable it on a shared or production
      # interface. Production uses Postgres/MySQL/Oracle profiles, which don't enable it.
      enabled: true
      path: /h2-console
  batch:
    jdbc:
      # We initialize the schema explicitly via spring.sql.init below so we
      # can control ordering (Spring Batch core tables must exist before
      # this library's cluster tables, which have FKs to them).
      initialize-schema: never
    cluster:
      enabled: true
      node-id-prefix: ${HOSTNAME:node}
      # This profile creates the cluster tables explicitly via spring.sql.init below (to control
      # ordering and tolerate the shared file-DB across multiple nodes), so the built-in auto-DDL
      # is turned off here. A typical app would instead just leave initialize-schema at its default.
      initialize-schema: never
      # Fast timings so this example demonstrates failover quickly: a dead node's row is removed in
      # roughly 8 seconds (3s to be marked UNREACHABLE + 5s cleanup), so you can kill/restart a node
      # and re-run within seconds. All example profiles use these demo timings; a real deployment
      # should keep the library production defaults (~75s recovery) rather than overriding them.
      heartbeat-interval: 1000
      task-polling-interval: 1000
      unreachable-node-threshold: 3000
      node-cleanup-threshold: 5000
  sql:
    init:
      mode: always
      platform: h2
      # Order matters: Spring Batch core tables first, then this library's
      # cluster tables (which reference BATCH_JOB_EXECUTION / BATCH_STEP_EXECUTION).
      schema-locations:
        - classpath:org/springframework/batch/core/schema-h2.sql
        - classpath:schema/schema-h2.sql
      # CREATE TABLE ... IF NOT EXISTS isn't used here; tolerate "already exists"
      # on subsequent runs so the example doesn't fail on restart.
      continue-on-error: true

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "health,info,batch-cluster,batch-cluster-jobs"
