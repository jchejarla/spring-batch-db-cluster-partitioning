# Default profile is "postgres". To switch databases:
#   --spring.profiles.active=mysql
#   --spring.profiles.active=oracle
#   --spring.profiles.active=h2       (zero-setup quick smoke test)
# See application-<db>.yml for the corresponding connection settings.
spring.profiles.active=postgres

# These demo jobs are triggered on demand via REST, not auto-run at startup. Disable Spring Boot's
# JobLauncherApplicationRunner (which otherwise fails with "Job name must be specified" when multiple
# job beans are present).
spring.batch.job.enabled=false

# The JMS/ActiveMQ remote-partitioning demo (examples...messaging.*) is opt-in via
# spring.batch.msg-channel.enabled. But activemq-client on the classpath makes Spring Boot
# auto-configure a vm://localhost ConnectionFactory, whose JMS health contributor then reports DOWN
# because no broker is running - falsely dragging /actuator/health to DOWN on the default and H2
# runs, which do not use JMS at all. This cluster is coordinated through the database, not a broker,
# so health should reflect the DB cluster. Disable the JMS health check by default; if you actually
# run the JMS demo against a real broker, re-enable it.
management.health.jms.enabled=false
