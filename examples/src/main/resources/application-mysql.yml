spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dev_db?useUnicode=true&characterEncoding=UTF-8
    username: dev_user
    password: dev_password

  batch:
    jdbc:
      initialize-schema: "never"
    cluster:
      enabled: true
      node-id: ${HOSTNAME:worker}-${random.uuid}
      grid-size: 4
      heartbeat-interval: 5000
      task-polling-interval: 2000

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "health,info,batch-cluster"
