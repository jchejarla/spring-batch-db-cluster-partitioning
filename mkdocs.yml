site_name: Spring Batch DB Cluster Partitioning
site_description: Database-coordinated distributed partitioning for Spring Batch — versioned documentation.
site_url: https://jchejarla.github.io/spring-batch-db-cluster-partitioning/docs/
repo_url: https://github.com/jchejarla/spring-batch-db-cluster-partitioning
repo_name: jchejarla/spring-batch-db-cluster-partitioning
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: teal
      accent: teal

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage guide: guide.md
  - Configuration: configuration.md
  - Observability: Observability.md
  - Security: security.md
  - Examples: examples.md
  - Design: DESIGN.md
  - Migration (2.x → 3.0): migration.md
  - FAQ: faq.md
  - API (Javadoc): apidocs/index.html

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  # Lets docs include external files (config table generated from source, example code).
  # check_paths fails the build if an included path is missing — a drift guard in itself.
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

exclude_docs: |
  # Generated at build time by the docs workflow; not part of the repo.
  SRS_Spring_Batch_Clustering_JChejarla.pdf
  # Snippet partials included into pages, not standalone pages themselves.
  _snippets/

extra:
  version:
    provider: mike
